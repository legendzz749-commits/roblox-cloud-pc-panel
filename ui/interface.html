<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Neural Interface</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #04070d;
    color: #9beaf5;
    font-family: 'Consolas', 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #hud {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .corner {
    position: absolute; padding: 16px; font-size: 11px;
    letter-spacing: 2px; opacity: 0.7; line-height: 1.8;
  }
  .tl { top: 0; left: 0; }
  .tr { top: 0; right: 0; text-align: right; }
  .bl { bottom: 90px; left: 0; }
  .br { bottom: 90px; right: 0; text-align: right; }
  .stat b { color: #4dd8f0; }
  canvas { display: block; }
  #status {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 13px; letter-spacing: 4px; color: #4dd8f0;
    text-shadow: 0 0 12px rgba(77,216,240,0.8);
  }
  #transcript {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    width: min(600px, 90vw); text-align: center; font-size: 15px;
    color: #cdeff7; min-height: 48px;
    text-shadow: 0 0 8px rgba(77,216,240,0.4);
  }
  #inputbar {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: min(600px, 90vw); display: flex; gap: 8px;
  }
  #cmd {
    flex: 1; background: rgba(10, 20, 32, 0.8);
    border: 1px solid rgba(77,216,240,0.35); border-radius: 8px;
    color: #cdeff7; padding: 12px 16px; font-family: inherit; font-size: 14px;
    outline: none;
  }
  #cmd:focus { border-color: #4dd8f0; box-shadow: 0 0 16px rgba(77,216,240,0.25); }
  #send {
    background: #4dd8f0; color: #04070d; border: none; border-radius: 8px;
    padding: 12px 20px; font-family: inherit; font-weight: bold; cursor: pointer;
    letter-spacing: 1px;
  }
  #send:hover { background: #7ce4f5; }
  @media (prefers-reduced-motion: reduce) {
    /* orb animation slows drastically via JS check */
  }
</style>
</head>
<body>
<canvas id="orb"></canvas>
<div id="status">◉ SYSTEMS ONLINE</div>
<div id="hud">
  <div class="corner tl">
    NEURAL INTERFACE v1.0<br>
    <span class="stat">CORE LOAD <b id="load">--%</b></span><br>
    <span class="stat">MEMORY <b id="mem">--%</b></span>
  </div>
  <div class="corner tr">
    <span id="clock">--:--:--</span><br>
    <span class="stat">LATENCY <b id="lat">--ms</b></span><br>
    <span class="stat">SUBSYSTEMS <b>07/07</b></span>
  </div>
  <div class="corner bl">
    AUDIO INPUT<br><b id="audiostate">STANDBY</b>
  </div>
  <div class="corner br">
    COGNITION<br><b>99.2%</b>
  </div>
</div>
<div id="transcript"></div>
<div id="inputbar">
  <input id="cmd" placeholder="Speak or type a command..." autocomplete="off">
  <button id="send">SEND</button>
</div>

<script>
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2 - 30;
}
resize();
window.addEventListener('resize', resize);

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// state: idle | listening | thinking | speaking
let state = 'idle';
let t = 0;

// Particle rings
const rings = [];
for (let r = 0; r < 3; r++) {
  const pts = [];
  const n = 60 + r * 20;
  for (let i = 0; i < n; i++) pts.push(i / n * Math.PI * 2);
  rings.push({ pts, radius: 110 + r * 45, speed: (0.002 + r * 0.0015) * (r % 2 ? -1 : 1), tilt: 0.35 + r * 0.18 });
}

function stateColor() {
  switch (state) {
    case 'listening': return [77, 240, 150];
    case 'thinking':  return [240, 200, 77];
    case 'speaking':  return [130, 160, 255];
    default:          return [77, 216, 240];
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += reducedMotion ? 0.15 : 1;
  const [r, g, b] = stateColor();
  const pulse = 1 + Math.sin(t * 0.03) * (state === 'idle' ? 0.03 : 0.09);

  // Core glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 160 * pulse);
  grad.addColorStop(0, `rgba(${r},${g},${b},0.55)`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},0.15)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Inner core
  ctx.beginPath();
  ctx.arc(cx, cy, 42 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
  ctx.shadowColor = `rgba(${r},${g},${b},1)`;
  ctx.shadowBlur = 40;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Orbiting particle rings
  rings.forEach((ring, ri) => {
    ring.pts.forEach((a0) => {
      const a = a0 + t * ring.speed * (state === 'thinking' ? 3 : 1);
      const x = cx + Math.cos(a) * ring.radius * pulse;
      const y = cy + Math.sin(a) * ring.radius * ring.tilt * pulse;
      const depth = (Math.sin(a) + 1) / 2;
      ctx.beginPath();
      ctx.arc(x, y, 1.2 + depth * 1.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${0.25 + depth * 0.6})`;
      ctx.fill();
    });
  });

  // Waveform when speaking/listening
  if (state === 'speaking' || state === 'listening') {
    ctx.beginPath();
    for (let x = 0; x < 200; x++) {
      const px = cx - 100 + x;
      const py = cy + 210 + Math.sin(x * 0.15 + t * 0.2) * Math.sin(x * 0.05) * 14;
      x === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.strokeStyle = `rgba(${r},${g},${b},0.7)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}, 1000);

// Poll backend for state
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const audioEl = document.getElementById('audiostate');

async function poll() {
  try {
    const res = await fetch('/state');
    const s = await res.json();
    state = s.state || 'idle';
    statusEl.textContent = '◉ ' + (s.status_text || 'SYSTEMS ONLINE');
    if (s.transcript) transcriptEl.textContent = s.transcript;
    audioEl.textContent = state === 'listening' ? 'LISTENING' : 'STANDBY';
    document.getElementById('load').textContent = (s.cpu ?? '--') + '%';
    document.getElementById('mem').textContent = (s.mem ?? '--') + '%';
    document.getElementById('lat').textContent = (s.latency ?? '--') + 'ms';
  } catch (e) { /* backend not running — demo mode */ }
}
setInterval(poll, 700);

// Send typed commands to backend
async function send() {
  const input = document.getElementById('cmd');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  transcriptEl.textContent = '> ' + text;
  state = 'thinking';
  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: text })
    });
    const data = await res.json();
    transcriptEl.textContent = data.response || '';
    state = 'idle';
  } catch (e) {
    transcriptEl.textContent = '[backend offline — run: python main.py --ui]';
    state = 'idle';
  }
}
document.getElementById('send').addEventListener('click', send);
document.getElementById('cmd').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
